<!doctype html>
<html lang="en">
  <head>
    <title>Foogem</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" href="/public/images/logo.png" />

    <!-- Web Components for shared navbar and footer layout -->
    <link rel="stylesheet" href="/src/styles/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    />
    <script type="module" src="/src/components/site-footer.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.css"
    />
    <script src="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.js"></script>
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
  </head>

  <body>
    <site-navbar></site-navbar>
    <!-- Main content goes here -->
    <main class="container-fluid bg-light text-dark p-0 position-relative home">
      <!-- PLACEHOLDER, this will be shown when clicked on map -->
      <div id="map" style="width: 100%; height: 100%"></div>

      <div
        id="cuisine-filter"
        class="d-flex gap-2 position-absolute top-0 start-0 mt-3 px-2 justify-content-md-center"
      >
        <button class="active filter-btn rounded-pill" data-cuisine="all">
          All
        </button>
        <button class="filter-btn rounded-pill" data-cuisine="Asian">
          Asian
        </button>
        <button class="filter-btn rounded-pill" data-cuisine="Mexican">
          Mexican
        </button>
        <button class="filter-btn rounded-pill" data-cuisine="Indian">
          Indian
        </button>
        <button class="filter-btn rounded-pill" data-cuisine="Mediterranean">
          Mediterranean
        </button>
        <button class="filter-btn rounded-pill" data-cuisine="American">
          American
        </button>
        <button class="filter-btn rounded-pill" data-cuisine="Desserts">
          Desserts
        </button>
      </div>

      <div class="position-absolute bottom-0 start-0 mb-3 ms-3">
        <a href="createGem.html">
          <img
            src="/images/add.svg"
            alt="add post"
            width="50"
            height="50"
            class="add-icon"
          />
        </a>
      </div>
    </main>

    <site-footer></site-footer>

    <!-- JS FOR HAMBURGER -->
    <script>
      function toggleMenu() {
        const menu = document.getElementById("dropdownMenu");
        menu.style.display = menu.style.display === "block" ? "none" : "block";
      }
    </script>

    <script type="module" src="/src/map.js"></script>
    <script type="module" src="/src/app.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
