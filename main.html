<!doctype html>
<html lang="en">
  <head>
    <title>Restogem</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Web Components for shared navbar and footer layout -->
    <link rel="stylesheet" href="/src/styles/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    />
    <script type="module" src="/src/components/site-footer.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.css"
    />
    <script src="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.js"></script>
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
  </head>

  <body>
    <!-- NEW FIGMA NAVBAR -->
    <nav class="figma-navbar">

      <div class="nav-top">

        <div class="nav-brand">
  <div class="nav-logo">
<img src="/images/logo.png" alt="logo" />
  </div>
  <span class="brand-text">Restolocal</span>
</div>

        <div class="nav-search">
          <input type="text" placeholder="Search..." />
        </div>

        <div class="nav-menu">
          <i class="fa-solid fa-bars" onclick="toggleMenu()"></i>

          <!-- DROPDOWN ADDED -->
          <div class="dropdown-menu-custom" id="dropdownMenu">
            <a href="#">Profile</a>
           <a href="#" id="logoutBtn">Logout</a>
          </div>
        </div>

      </div>

      <!-- FILTERS -->
      <div class="nav-filters">
        <button class="filter-btn main-nav-btn">Pizza</button>
        <button class="filter-btn main-nav-btn">Burgers</button>
        <button class="filter-btn main-nav-btn">Sushi</button>
      </div>

    </nav>

    <!-- Main content goes here -->
    <main class="container-fluid bg-light text-dark p-0 position-relative home">
      <!-- PLACEHOLDER, this will be shown when clicked on map -->
      <div id="map" style="width: 100%; height: 100%"></div>

      <div class="position-absolute bottom-0 start-0 mb-3 ms-3">
        <a href="/createGem">
          <img
            src="/public/images/add.svg"
            alt="add post"
            width="50"
            height="50"
          />
        </a>
      </div>

      <!-- Card popup template -->
      <!-- (unchanged) -->
    </main>

    <site-footer></site-footer>

    <!-- JS FOR HAMBURGER -->
    <script>
      function toggleMenu() {
        const menu = document.getElementById("dropdownMenu");
        menu.style.display =
          menu.style.display === "block" ? "none" : "block";
      }
    </script>

    <script type="module" src="/src/map.js"></script>
    <script type="module" src="/src/app.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
