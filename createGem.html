<!doctype html>
<html lang="en">
  <head>
    <title>Create a Gem</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link rel="stylesheet" href="/src/styles/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <!-- Navbar and footer components -->
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
  </head>

  <body>
    <site-navbar></site-navbar>

    <main class="container-fluid bg-light text-dark p-5">
      <div>
        <div class="container mt-4">
          <h1>Create a gem</h1>

          <form id="form">
            <!-- Name -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Name</label>
              <input
                type="text"
                id="name"
                class="form-control"
                placeholder="Enter a hidden gem"
                required
              />
            </div>

            <!-- Category -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Category</label>
              <div class="d-flex flex-wrap gap-2">
                <input
                  type="radio"
                  class="btn-check"
                  name="category"
                  id="nearVenue"
                  value="Near a Venue"
                  required
                />
                <label
                  class="btn btn-outline-secondary rounded-pill"
                  for="nearVenue"
                  >🚇 Near a Venue</label
                >

                <input
                  type="radio"
                  class="btn-check"
                  name="category"
                  id="quickBite"
                  value="Quick Bite"
                />
                <label
                  class="btn btn-outline-secondary rounded-pill"
                  for="quickBite"
                  >⚡ Quick Bite</label
                >

                <input
                  type="radio"
                  class="btn-check"
                  name="category"
                  id="watchParty"
                  value="Watch Party"
                />
                <label
                  class="btn btn-outline-secondary rounded-pill"
                  for="watchParty"
                  >🍺 Watch Party</label
                >

                <input
                  type="radio"
                  class="btn-check"
                  name="category"
                  id="cheapEats"
                  value="Cheap Eats"
                />
                <label
                  class="btn btn-outline-secondary rounded-pill"
                  for="cheapEats"
                  >💸 Cheap Eats</label
                >

                <input
                  type="radio"
                  class="btn-check"
                  name="category"
                  id="momAndPop"
                  value="Mom & Pop"
                />
                <label
                  class="btn btn-outline-secondary rounded-pill"
                  for="momAndPop"
                  >🏠 Mom & Pop</label
                >

                <input
                  type="radio"
                  class="btn-check"
                  name="category"
                  id="onlyInVancouver"
                  value="Only in Vancouver"
                />
                <label
                  class="btn btn-outline-secondary rounded-pill"
                  for="onlyInVancouver"
                  >🌏 Only in Vancouver</label
                >
              </div>
            </div>

            <!-- Description -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Description</label>
              <textarea
                id="description"
                rows="4"
                class="form-control"
                placeholder="What makes this place special?"
                required
              ></textarea>
            </div>

            <!-- Map -->
            <div class="mb-3">
              <label class="form-label fw-semibold"
                >Choose location on map</label
              >
              <div
                id="pickMap"
                class="rounded border"
                style="height: 300px; width: 100%"
              ></div>
            </div>

            <!-- Lat/Lng -->
            <div class="row mb-3">
              <div class="col">
                <label for="latitude" class="form-label fw-semibold"
                  >Latitude</label
                >
                <input
                  type="text"
                  id="latitude"
                  readonly
                  class="form-control bg-light"
                />
              </div>
              <div class="col">
                <label for="longitude" class="form-label fw-semibold"
                  >Longitude</label
                >
                <input
                  type="text"
                  id="longitude"
                  readonly
                  class="form-control bg-light"
                />
              </div>
            </div>

            <!-- Submit -->
            <div class="d-grid">
              <button
                id="postButton"
                type="submit"
                class="btn btn-info text-light"
              >
                Add gem
              </button>
            </div>
          </form>
          <div id="successMsg" class="alert alert-success mt-3 d-none">
            Gem added successfully!
          </div>
        </div>
      </div>
    </main>

    <site-footer></site-footer>

    <script type="module" src="src/createGem.js"></script>
  </body>
</html>
