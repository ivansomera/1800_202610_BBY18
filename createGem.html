<!doctype html>
<html lang="en">
  <head>
    <title>Create a Gem</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" href="/public/images/logo.png" />

    <!-- Bootstrap -->
    <link rel="stylesheet" href="/src/styles/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <!-- Navbar and footer components -->
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
  </head>

  <body>
    <site-navbar></site-navbar>

    <main class="container-fluid bg-light text-dark p-5">
      <div>
        <div class="container mt-4">
          <h1>Create a gem</h1>

          <form id="form">
            <!-- Name -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Name</label>
              <input
                type="text"
                id="name"
                class="form-control"
                placeholder="Enter your food truck's name"
                required
              />
            </div>

            <!-- Date range -->
            <div class="mb-3 d-flex flex-wrap gap-3">
              <div>
                <label for="dateFrom" class="form-label fw-semibold"
                  >Start Date</label
                >
                <input type="date" id="dateFrom" name="dateFrom" required />
              </div>
              <div>
                <label for="dateTo" class="form-label fw-semibold"
                  >End Date</label
                >
                <input type="date" id="dateTo" name="dateTo" required />
              </div>
            </div>

            <!-- Hours of Operation -->
            <div class="mb-3 d-flex flex-wrap gap-3">
              <label class="form-label fw-semibold">Hours of Operation</label>
              <div class="d-flex align-items-center gap-2">
                <input
                  type="time"
                  id="openTime"
                  name="openTime"
                  class="form-control"
                />
                <span>to</span>
                <input
                  type="time"
                  id="closeTime"
                  name="closeTime"
                  class="form-control"
                />
              </div>
            </div>

            <!-- Description -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Description</label>
              <textarea
                id="description"
                rows="4"
                class="form-control"
                placeholder="What makes this place special?"
                required
              ></textarea>
            </div>

            <!-- Cuisine -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Cuisine</label>
              <div class="d-flex flex-wrap gap-2">
                <input
                  type="radio"
                  class="btn-check"
                  name="cuisine"
                  id="asian"
                  value="Asian"
                  required
                />
                <label
                  class="btn btn-outline-secondary rounded-pill"
                  for="asian"
                  >Asian</label
                >
                <input
                  type="radio"
                  class="btn-check"
                  name="cuisine"
                  id="mexican"
                  value="Mexican"
                  required
                />
                <label
                  class="btn btn-outline-secondary rounded-pill"
                  for="mexican"
                  >Mexican</label
                >

                <input
                  type="radio"
                  class="btn-check"
                  name="cuisine"
                  id="indian"
                  value="Indian"
                  required
                />
                <label
                  class="btn btn-outline-secondary rounded-pill"
                  for="indian"
                  >Indian</label
                >

                <input
                  type="radio"
                  class="btn-check"
                  name="cuisine"
                  id="mediterranean"
                  value="Mediterranean"
                  required
                />
                <label
                  class="btn btn-outline-secondary rounded-pill"
                  for="mediterranean"
                  >Mediterranean</label
                >

                <input
                  type="radio"
                  class="btn-check"
                  name="cuisine"
                  id="american"
                  value="American"
                  required
                />
                <label
                  class="btn btn-outline-secondary rounded-pill"
                  for="american"
                  >American</label
                >

                <input
                  type="radio"
                  class="btn-check"
                  name="cuisine"
                  id="desserts"
                  value="Desserts"
                  required
                />
                <label
                  class="btn btn-outline-secondary rounded-pill"
                  for="desserts"
                  >Desserts</label
                >
              </div>
            </div>

            <!-- Spice Level -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Spice Level</label>
              <div class="d-flex flex-wrap gap-2">
                <input
                  type="radio"
                  class="btn-check"
                  name="spiceLevel"
                  id="mild"
                  value="Mild"
                />
                <label class="btn btn-outline-secondary rounded-pill" for="mild"
                  >Mild</label
                >
                <input
                  type="radio"
                  class="btn-check"
                  name="spiceLevel"
                  id="medium"
                  value="Medium"
                />
                <label
                  class="btn btn-outline-secondary rounded-pill"
                  for="medium"
                  >Medium</label
                >

                <input
                  type="radio"
                  class="btn-check"
                  name="spiceLevel"
                  id="hot"
                  value="Hot"
                />
                <label class="btn btn-outline-secondary rounded-pill" for="hot"
                  >Hot</label
                >
              </div>
            </div>

            <!-- Map -->
            <div class="mb-3">
              <label class="form-label fw-semibold"
                >Choose location on map</label
              >
              <div
                id="pickMap"
                class="rounded border"
                style="height: 300px; width: 100%"
              ></div>
            </div>

            <!-- Lat/Lng -->
            <div class="row mb-3 d-none">
              <div class="col">
                <label for="latitude" class="form-label fw-semibold"
                  >Latitude</label
                >
                <input
                  type="text"
                  id="latitude"
                  readonly
                  class="form-control bg-light"
                />
              </div>
              <div class="col">
                <label for="longitude" class="form-label fw-semibold"
                  >Longitude</label
                >
                <input
                  type="text"
                  id="longitude"
                  readonly
                  class="form-control bg-light"
                />
              </div>
            </div>

            <!-- Submit -->
            <div class="d-grid">
              <button
                id="postButton"
                type="submit"
                class="btn btn-info text-light"
              >
                Add gem
              </button>
            </div>
          </form>
          <div id="successMsg" class="alert alert-success mt-3 d-none">
            Gem added successfully!
          </div>
        </div>
      </div>
    </main>

    <site-footer></site-footer>

    <script type="module" src="src/createGem.js"></script>
  </body>
</html>
