<!DOCTYPE html>
<html lang="en">
<head>
  <title>Reviews</title>

  <!-- Required meta -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Main CSS -->
  <link rel="stylesheet" href="/src/styles/style.css" />

  <!-- Bootstrap + Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <!-- Navbar + Footer Components -->
  <script type="module" src="/src/components/site-navbar.js"></script>
  <script type="module" src="/src/components/site-footer.js"></script>
</head>

<body>
  <!-- Navbar -->
  <site-navbar></site-navbar>

  <!-- Main Content -->
  <main class="reviews-page">
    <h1 id="restaurant-title">Restaurant Reviews</h1>

    <div class="add-review">
      <input type="text" id="userName" placeholder="Your Name" />
      <textarea id="reviewText" placeholder="Write your review"></textarea>
      <input type="number" id="rating" placeholder="Rating (1-5)" min="1" max="5" />
      <button id="submitReview">Submit Review</button>
    </div>

    <div id="reviews-container"></div>
  </main>

  <!-- Footer -->
  <site-footer></site-footer>

  <!-- JS -->
  <script type="module" src="/src/reviews.js"></script>
</body>
</html>
