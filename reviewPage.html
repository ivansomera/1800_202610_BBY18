<!doctype html>
<html lang="en">
  <head>
    <title>Restogem</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Web Components for shared navbar and footer layout -->
    <link rel="stylesheet" href="/src/styles/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    />
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

  </head>

  <body>

    <!------------------------------>
    <!-- Your HTML Layout go here -->
    <!------------------------------>
    

    <!-- our own navbar goes here -->
    <site-navbar></site-navbar>

    <!-- Main content goes here -->
     <div class="container">
        <br>
        <h1>Review for <span id="hikeName"> Resto Name</span></h1>
        <br>
        <form>
            <div class="form-group">
                <label for="exampleFormControlInput1">* Add a title</label>
                <input type="text" class="form-control" id="title" placeholder="Title">
            </div><br>
            <div class="form-group">
                <div class="card-body">
                    <p>Rate your overall experience:</p>
                    <span class="material-icons star" id="star1">star_outline</span>
                    <span class="material-icons star" id="star2">star_outline</span>
                    <span class="material-icons star" id="star3">star_outline</span>
                    <span class="material-icons star" id="star4">star_outline</span>
                    <span class="material-icons star" id="star5">star_outline</span>
                </div>
                <label for="exampleFormControlSelect1">How expensive was the food?</label>
                <select class="form-control" id="level">
                    <option>$</option>
                    <option>$$</option>
                    <option>$$$</option>
                </select>
                <br>
                <div class="form-group">
                    <label for="exampleFormControlTextarea1">* What did you think of the trail?</label>
                    <textarea class="form-control" id="description" rows="3"></textarea>
                </div>
                <br>

                <div class="d-flex">
                    <button type="button" class="btn btn-lg btn-primary pull-right" id="submitBtn">Submit</button>
                </div>
            </div>
        </form>
    </div>


    <!-- Thank You Modal -->
    <div class="modal fade" id="thankYouModal" tabindex="-1" aria-labelledby="thankYouLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center">
                <div class="modal-header">
                    <h5 class="modal-title" id="thankYouLabel">Thank You!</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Your review has been successfully submitted. 🌟</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
    

    <!-- our own footer goes here -->
    <site-footer></site-footer>

    <!---------------------------------------------->
    <!-- Your own JavaScript scripts go here      -->
    <!---------------------------------------------->
    <script type="module" src="/src/reviewPage.js"></script>

  </body>
</html>
