<!doctype html>
<html lang="en">

<head>
    <title>Create Post</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="/src/styles/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">



    <!-- Navbar and footer components -->
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>

</head>

<body>

    <site-navbar></site-navbar>

    <div class="container-fluid bg-light text-dark p-5">
        <div class="container mt-4">
            <h1>Make a Post</h1>

            <form>

                <div class="form-group mb-3">
                    <label>Restaurant Name</label>
                    <input type="text" id="restaurantName" class="form-control" placeholder="Enter restaurant name">
                </div>

                <div class="form-group">
                    <label>Hidden Gem Description</label>
                    <textarea id="description" rows="4" cols="50" class="form-control"></textarea>
                </div>

                <div class="form-group mb-3">
                    <label>Rating </label>
                    <div id="star-rating">
                        <i class="bi bi-star star" data-value="1"></i>
                        <i class="bi bi-star star" data-value="2"></i>
                        <i class="bi bi-star star" data-value="3"></i>
                        <i class="bi bi-star star" data-value="4"></i>
                        <i class="bi bi-star star" data-value="5"></i>
                    </div>
                </div>
        </div>


        <div class="form-group mb-3">
            <label>Cuisine</label>
            <input type="text" id="cuisine" class="form-control" placeholder="e.g. Italian, Chinese">
        </div>


        <div class="py-3">
            <input type="file" id="inputImage" accept="image/*" class="form-control" />
            <img id="mypic-goes-here" width="100" height="100" />
        </div>

        <div class="d-flex mt-5">
            <button id="postButton" type="button" class="btn btn-info">
                Post Now
            </button>
        </div>

        </form>
    </div>

    <site-footer></site-footer>

    <script type="module" src="/src/createPost.js"></script>

</body>

</html>
